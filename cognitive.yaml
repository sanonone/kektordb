# KektorDB — Cognitive Engine Configuration
# Activate with: ./kektordb --cognitive-config cognitive.yaml

# Memory Layers Configuration (Episodic/Semantic/Procedural)
# Uncomment to enable cognitive memory architecture:
#
# gardener:
#   memory_layers:
#     episodic:
#       decay_half_life: "72h"      # Memories fade after 3 days
#       auto_summarize: true         # Consolidate into semantic facts
#       pinned_by_default: false
#     semantic:
#       decay_half_life: "720h"     # Facts last 30 days
#       auto_summarize: false
#       pinned_by_default: false
#     procedural:
#       decay_half_life: "0"        # Never decay
#       auto_summarize: false
#       pinned_by_default: true      # Auto-pin system rules
#   consolidation:
#     similarity_threshold: 0.90
#     max_episodic_age: "7d"

gardener:
  # Enable/disable the Gardener daemon
  enabled: true

  # Operation mode:
  #   "basic"    — Graph & math detectors only (no LLM required)
  #   "advanced" — + LLM-powered detectors (contradictions, user preferences, failure patterns, knowledge evolution)
  #   "meta"     — + cross-detector confidence validation (requires advanced)
  mode: "meta"

  # How often the Gardener wakes up to analyze the graph
  interval: "30s"

  # Which indexes to analyze:
  #   ["*"]           — all indexes
  #   ["knowledge_base", "memories"] — specific indexes
  target_indexes: ["*"]

  # Adaptive scheduling:
  # If this many write operations occur before the next interval,
  # the Gardener wakes up early instead of waiting
  adaptive_threshold: 200

  # Minimum time between adaptive wakes (prevents rapid-fire analysis)
  adaptive_min_interval: "90s"

# Auto-resolve: let the Gardener autonomously act on whitelisted reflection types.
# The LLM already made its decision during detection. The Resolver just executes it.
auto_resolve:
  enabled: true
  actions:
    # Auto-create graph links for knowledge gap reflections
    # (entities that are semantically similar but not graph-connected)
    create_suggested_links:
      enabled: true
      # Only auto-create if cosine similarity >= this threshold
      min_confidence: 0.90

    # Auto-resolve minor contradictions
    # (only when the LLM determined action_required=false during detection)
    mark_minor_contradictions:
      enabled: true

# LLM configuration (only used in "advanced" or "meta" mode)
llm:
  # API endpoint (OpenAI-compatible)
  # Ollama: "http://localhost:11434/v1"
  # OpenAI: "https://api.openai.com/v1"
  base_url: "http://localhost:11434/v1"

  # Model name
  model: "gemma4:latest"

  # API key (required for OpenAI, ignored by Ollama)
  api_key: "kektor"

  # Temperature (0.0 = deterministic, 1.0 = creative)
  temperature: 0.5

  # Max response tokens
  max_tokens: 500
