<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KektorDB — Cognitive Memory Engine</title>
<link rel="stylesheet" href="css/dashboard.css">
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
    <div class="logo"><img src="logo.png" alt="KektorDB"></div>
    <h2>Indexes</h2>
    <div id="index-list"><div class="loading" style="font-size:.8rem">Loading...</div></div>
    <div class="sidebar-footer">
        <div style="margin-bottom:8px"><a href="/ui/swagger.html" target="_blank">API Docs</a></div>
        <div><strong>Cognitive Engine</strong><br>Status: <span class="status-dot">●</span> <span id="engine-status">Ready</span></div>
        <div id="live-events-indicator" style="margin-top:8px;display:none"><span class="live-dot"></span> Live feed active</div>
    </div>
</div>

<!-- Main -->
<div id="main">
    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(this, 'memories')">Memories</button>
        <button class="tab-btn" onclick="switchTab(this, 'graph')">Graph</button>
        <button class="tab-btn" onclick="switchTab(this, 'cognitive')">Cognitive</button>
        <button class="tab-btn" onclick="switchTab(this, 'admin')">Admin</button>
        <button class="tab-btn" onclick="switchTab(this, 'api')">API</button>
    </div>

    <!-- Tab: Memories -->
    <div id="tab-memories" class="tab-content active">
        <div class="toolbar">
            <input type="text" id="search-query" placeholder="Search memories..." style="flex:1">
            <input type="number" id="search-k" value="10" min="1" max="100" style="width:60px" title="Results">
            <div class="view-toggle">
                <div class="view-btn active" id="btn-list" onclick="switchView('list')">List</div>
                <div class="view-btn" id="btn-graph" onclick="switchView('graph')">Graph</div>
            </div>
            <button class="btn btn-primary" onclick="performSearch()">Search</button>
            <button class="btn btn-secondary" onclick="showAddMemoryModal()">+ Add</button>
        </div>
        <div id="content-memories" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
            <div id="list-view" class="content-scroll" style="flex:1">
                <div class="empty-state"><p>Select an index and search.</p></div>
            </div>
            <div id="graph-view" style="display:none;flex:1"></div>
        </div>
    </div>

    <!-- Tab: Graph -->
    <div id="tab-graph" class="tab-content">
        <div class="toolbar">
            <input type="number" id="explore-limit" value="200" min="50" max="5000" style="width:80px" title="Max nodes">
            <button class="btn btn-primary" onclick="exploreGraph()">Explore Graph</button>
            <label style="font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:4px;margin-left:auto">
                <input type="checkbox" id="hide-chunks" onchange="refreshGraph()"> Simplify
            </label>
        </div>
        <div id="graph-canvas" class="graph-canvas"></div>
    </div>

    <!-- Tab: Cognitive -->
    <div id="tab-cognitive" class="tab-content">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="triggerThink()">Think Now</button>
            <button class="btn btn-secondary btn-sm" onclick="loadReflections('')">All</button>
            <button class="btn btn-secondary btn-sm" onclick="loadReflections('unresolved')">Unresolved</button>
            <button class="btn btn-secondary btn-sm" onclick="loadReflections('insight')">Insights</button>
            <button class="btn btn-secondary btn-sm" onclick="loadReflections('high_confidence')">High Conf</button>
            <span style="margin-left:auto;font-size:.8rem;color:var(--muted)">
                <span class="live-dot" id="sse-dot" style="display:none"></span>
                <span id="sse-status">SSE disconnected</span>
            </span>
        </div>
        <div class="split-view">
            <div class="split-list" id="reflection-list"><div class="loading">Loading...</div></div>
            <div class="split-detail" id="reflection-detail"><div class="empty-state"><p>Select a reflection.</p></div></div>
        </div>
    </div>

    <!-- Tab: Admin -->
    <div id="tab-admin" class="tab-content">
        <div class="content-scroll">
            <div class="admin-grid">
                <div class="admin-card">
                    <h3>Index Info</h3>
                    <div id="admin-index-info"><p style="color:var(--muted);font-size:.85rem">Select an index.</p></div>
                </div>
                <div class="admin-card">
                    <h3>Create Index</h3>
                    <div class="form-group"><label>Name</label><input type="text" id="create-name" placeholder="my_index"></div>
                    <div style="display:flex;gap:8px">
                        <div class="form-group" style="flex:1"><label>Metric</label><select id="create-metric"><option value="cosine">Cosine</option><option value="euclidean">Euclidean</option></select></div>
                        <div class="form-group" style="flex:1"><label>Precision</label><select id="create-prec"><option value="float32">float32</option><option value="float16">float16</option><option value="int8">int8</option></select></div>
                    </div>
                    <div class="form-group"><label>Language</label><select id="create-lang"><option value="">None</option><option value="english">English</option><option value="italian">Italian</option></select></div>
                    <button class="btn btn-primary" onclick="createIndex()">Create Index</button>
                </div>
                <div class="admin-card">
                    <h3>System</h3>
                    <div id="admin-stats" style="font-size:.85rem;color:var(--muted)">Select an index.</div>
                    <div style="margin-top:12px;display:flex;gap:8px">
                        <button class="btn btn-secondary btn-sm" onclick="systemSave()">Snapshot</button>
                        <button class="btn btn-secondary btn-sm" onclick="systemAOFRewrite()">AOF Rewrite</button>
                    </div>
                </div>
                <div class="admin-card">
                    <h3>Auto-Links</h3>
                    <div id="autolinks-list" style="font-size:.85rem;color:var(--muted);margin-bottom:8px">Select an index.</div>
                    <button class="btn btn-secondary btn-sm" onclick="showAutoLinksModal()">Configure</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab: API Docs -->
    <div id="tab-api" class="tab-content">
        <iframe src="/ui/swagger.html" style="width:100%;height:100%;border:none;background:#fff"></iframe>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
</div>

<!-- Scripts -->
<script src="js/core.js"></script>
<script src="js/memories.js"></script>
<script src="js/graph.js"></script>
<script src="js/cognitive.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
